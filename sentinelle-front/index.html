<!DOCTYPE html>
<html>
<head>
  <title>🌿 Sentinelle</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="layout">

  <!-- 🔍 SIDEBAR GAUCHE -->
  <div class="sidebar">

    <h2>🌿 Sentinelle</h2>

    <input type="text" id="search" placeholder="Rechercher une école">

    <select id="categorie">
      <option value="public">👨‍👩‍👧 Public</option>
      <option value="pro">🏛️ Pro</option>
    </select>

    <button id="btnSearch">🔍 Rechercher</button>

    <!-- Liste déroulante -->
    <details open>
      <summary>📋 Liste des écoles</summary>
      <ul id="listeEcoles"></ul>
    </details>

  </div>

  <!-- 🗺️ CARTE CENTRALE -->
  <div class="map-container">

    <iframe id="mapFrame"
      src="https://felt.com/embed/map/Untitled-Map-trd59Cqj4RuKu8WX9Cw2eYCD?loc=44.84,-0.58,12z">
    </iframe>

    <div id="popup"></div>

  </div>

  <!-- 📊 PANEL DROIT -->
  <div class="right-panel">

    <div id="result"></div>

    <div id="simulation"></div>

  </div>

</div>

<script src="script.js"></script>

</body>
</html>
